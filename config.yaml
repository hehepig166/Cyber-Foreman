server:
  host: 0.0.0.0
  port: 8021

database:
  path: data/monitor.db

collection:
  sample_interval_seconds: 10
  process_top_n: 50

retention:
  # Set null to disable cleanup.
  days: 30

logging:
  file_path: logs/monitor.log
  level: INFO
  max_bytes: 10485760
  backup_count: 5

feishu:
  enabled: true
  report_interval_seconds: 3600
  webhook_env_var: FEISHU_BOT_WEBHOOK
  timeout_seconds: 5
